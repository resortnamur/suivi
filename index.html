<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suivi des tâches</title>
  <style>
    :root{
      --panel:#ffffff;
      --line:#d8e0eb;
      --line-strong:#c4cfde;
      --text:#1b2430;
      --muted:#6b7788;
      --accent:#1f4fa3;
      --accent-soft:#edf3ff;
      --danger:#c5332b;
      --danger-soft:#fff4f3;
      --shadow:0 12px 28px rgba(16,24,40,.07);
      --radius:16px;
    }

    *{box-sizing:border-box}
    body{
  margin:0;
  font-family:Inter, Arial, sans-serif;
  color:var(--text);

  background:
    radial-gradient(900px 500px at 0% 0%, rgba(120,170,255,0.45), transparent 60%),
    radial-gradient(800px 500px at 100% 10%, rgba(255,140,200,0.40), transparent 60%),
    radial-gradient(700px 450px at 50% 100%, rgba(120,255,200,0.35), transparent 60%),
    radial-gradient(600px 400px at 20% 80%, rgba(255,220,120,0.30), transparent 60%),
    linear-gradient(180deg,#ffffff 0%, #f4f7ff 60%, #eef2f8 100%);

  background-attachment: fixed;
}

    .page{max-width:1040px;margin:0 auto;padding:24px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
    .topbar-left,.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .crumb{display:inline-flex;align-items:center;min-height:42px;padding:0 4px;color:var(--muted);font-size:14px;font-weight:700}
    .title{margin:0;font-size:28px;font-weight:800;letter-spacing:-.03em}

    button,.file-label{
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 14px;
      background:rgba(255,255,255,.96);
      color:var(--text);
      font:inherit;
      font-weight:700;
      cursor:pointer;
      transition:.16s ease;
      box-shadow:0 2px 8px rgba(15,23,42,.03);
    }
    button:hover,.file-label:hover{transform:translateY(-1px);border-color:var(--line-strong)}
    .back-btn{background:var(--accent-soft);color:var(--accent);border-color:#c9d7fb}
    .file-label input{display:none}

    .view-stack{display:grid;gap:16px}
    .action-bar{display:flex;justify-content:flex-end;align-items:center;gap:10px;flex-wrap:wrap}
    .grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
    .card,.detail-panel,.section-card,.deadline-card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .card{padding:20px;cursor:pointer;transition:.16s ease}
    .card:hover{transform:translateY(-2px);border-color:var(--line-strong)}

    .alert-panel{padding:18px;border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(180deg,#ffffff 0%, #fbfcfe 100%);box-shadow:var(--shadow)}
    .alert-panel h2{margin:0 0 12px;font-size:20px;font-weight:800;letter-spacing:-.02em}
    .alert-stack{display:grid;gap:18px}
    .alert-section{display:grid;gap:12px}
    .alert-section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .alert-section-title{margin:0;font-size:16px;font-weight:800;letter-spacing:-.01em}
    .alert-list{display:grid;gap:10px}
    .alert-item{display:grid;grid-template-columns:1.15fr .8fr .6fr .75fr 1.2fr;gap:10px;align-items:start;padding:12px 14px;border:1px solid #e7edf5;border-radius:12px;background:#fff}
    .alert-item.alert-soon{border-color:#f2c27c;background:#fff5e8}
    .alert-item.alert-overdue{border-color:#e59d98;background:#fff0ef}
    .alert-head{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;background:#f7f9fc}
    .alert-notes{white-space:pre-wrap;word-break:break-word;line-height:1.4;color:#425066}
    .home-toggle-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .upcoming-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:left;padding:14px 16px;border:1px solid #e7edf5;border-radius:12px;background:#fff;font-size:15px;font-weight:800;box-shadow:none}
    .upcoming-toggle:hover{transform:none;background:#f8fbff}
    .upcoming-toggle.active{border-color:#bfd1f3;background:#f8fbff}
    .upcoming-toggle-count{color:var(--muted);font-size:13px;font-weight:800}
    .priority-filter-row{display:flex;justify-content:flex-end;margin-bottom:12px}
    .priority-filter-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border:1px solid #e7edf5;border-radius:12px;background:#fff;font-size:14px;font-weight:800;box-shadow:none}
    .priority-filter-btn:hover{transform:none;background:#f8fbff}
    .filter-row{display:flex;justify-content:flex-end;align-items:center;gap:10px;flex-wrap:wrap}
    .filter-select{border:1px solid var(--line);border-radius:12px;padding:10px 14px;background:rgba(255,255,255,.96);color:var(--text);font:inherit;font-weight:700;box-shadow:0 2px 8px rgba(15,23,42,.03);min-width:220px}
    .executive-panel{padding:22px;border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.94) 0%, rgba(248,251,255,.98) 100%);box-shadow:0 20px 44px rgba(16,24,40,.08);display:grid;gap:20px}
    .executive-hero{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap}
    .executive-title-wrap{display:grid;gap:8px;max-width:700px}
    .executive-kicker{display:inline-flex;align-items:center;gap:8px;width:max-content;padding:7px 12px;border-radius:999px;background:#edf3ff;color:var(--accent);font-size:12px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;border:1px solid #d7e4ff}
    .executive-title{margin:0;font-size:34px;font-weight:900;letter-spacing:-.04em;line-height:1.02}
    .executive-subtitle{margin:0;color:#516072;font-size:15px;font-weight:600;line-height:1.5}
    .executive-cta{display:inline-flex;align-items:center;justify-content:center;min-width:280px;padding:18px 24px;border-radius:18px;background:linear-gradient(180deg,#2b63c6 0%, #1f4fa3 100%);color:#fff;border-color:#1f4fa3;font-size:16px;font-weight:900;box-shadow:0 18px 36px rgba(31,79,163,.24)}
    .executive-cta:hover{border-color:#1f4fa3;transform:translateY(-2px)}
    .executive-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
    .executive-stat{padding:16px 18px;border:1px solid #e3ebf6;border-radius:18px;background:#fff;box-shadow:0 6px 18px rgba(15,23,42,.04);display:grid;gap:6px}
    .executive-stat-label{font-size:12px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
    .executive-stat-value{font-size:34px;font-weight:900;letter-spacing:-.04em;color:var(--text);line-height:1}
    .executive-stat-meta{font-size:13px;color:#5e6d81;font-weight:700}
    .executive-columns{display:grid;gap:16px;grid-template-columns:1.2fr .8fr}
    .executive-card{padding:18px;border:1px solid #e3ebf6;border-radius:20px;background:#fff;box-shadow:0 8px 20px rgba(15,23,42,.04);display:grid;gap:12px}
    .executive-card h2{margin:0;font-size:18px;font-weight:900;letter-spacing:-.02em}
    .executive-list{display:grid;gap:10px}
    .executive-row{display:grid;grid-template-columns:minmax(0,1.3fr) auto;gap:10px;align-items:center;padding:11px 12px;border:1px solid #e8eef7;border-radius:14px;background:#fbfcff}
    .executive-row-main{min-width:0;display:grid;gap:4px}
    .executive-row-title{font-size:14px;font-weight:800;color:var(--text);line-height:1.25}
    .executive-row-meta{font-size:12px;color:var(--muted);font-weight:700}
    .executive-chip{display:inline-flex;align-items:center;justify-content:center;padding:7px 10px;border-radius:999px;background:#eef3fa;color:#476079;font-size:12px;font-weight:900;white-space:nowrap}
    .executive-row.alert-overdue{border-color:#e59d98;background:#fff0ef}
    .executive-row.alert-soon{border-color:#f2c27c;background:#fff5e8}
    .dashboard-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .secondary-cta{display:inline-flex;align-items:center;justify-content:center;min-width:220px;padding:16px 22px;border-radius:18px;background:#fff;color:var(--accent);border:1px solid #c9d7fb;font-size:15px;font-weight:900;box-shadow:0 12px 28px rgba(31,79,163,.08)}
    .secondary-cta:hover{border-color:#aebfe9;transform:translateY(-2px)}
    .calendar-panel{padding:22px;border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.95) 0%, rgba(247,250,255,.98) 100%);box-shadow:0 20px 44px rgba(16,24,40,.08);display:grid;gap:18px}
    .calendar-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .calendar-title-wrap{display:grid;gap:6px}
    .calendar-title{margin:0;font-size:30px;font-weight:900;letter-spacing:-.04em}
    .calendar-subtitle{margin:0;color:#516072;font-size:14px;font-weight:600}
    .calendar-nav{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .calendar-month-label{min-width:240px;text-align:center;font-size:18px;font-weight:900;color:var(--text)}
    .calendar-grid-wrap{display:grid;gap:10px}
    .calendar-weekdays,.calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px}
    .calendar-weekday{padding:10px 8px;text-align:center;font-size:12px;font-weight:900;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
    .calendar-day{min-height:118px;padding:10px;border:1px solid #e3ebf6;border-radius:18px;background:#fff;display:grid;gap:8px;align-content:start;box-shadow:0 6px 18px rgba(15,23,42,.04)}
    .calendar-day.muted{background:#f8fafd;color:#96a1b1}
    .calendar-day.today{border-color:#bfd1f3;box-shadow:0 10px 24px rgba(31,79,163,.12)}
    .calendar-day.has-items{background:#fbfcff}
    .calendar-day-number{font-size:14px;font-weight:900}
    .calendar-day-list{display:grid;gap:6px}
    .calendar-pill{display:block;width:100%;text-align:left;padding:7px 8px;border:1px solid #e8eef7;border-radius:10px;background:#f8fbff;font-size:11px;font-weight:800;line-height:1.25;box-shadow:none}
    .calendar-pill:hover{transform:none;background:#eef4ff}
    .calendar-pill.alert-overdue{border-color:#e59d98;background:#fff0ef}
    .calendar-pill.alert-soon{border-color:#f2c27c;background:#fff5e8}
    .calendar-pill-more{padding:2px 2px 0;color:var(--muted);font-size:11px;font-weight:800}
    .calendar-agenda{display:grid;gap:10px}
    .calendar-agenda-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .calendar-agenda-title{margin:0;font-size:18px;font-weight:900;letter-spacing:-.02em}
    .calendar-agenda-list{display:grid;gap:10px}
    .calendar-agenda-item{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(0,.9fr) auto auto;gap:10px;align-items:center;padding:12px 14px;border:1px solid #e8eef7;border-radius:14px;background:#fff;text-align:left}
    .calendar-agenda-main{min-width:0;display:grid;gap:4px}
    .calendar-agenda-task{font-size:14px;font-weight:800;color:var(--text);line-height:1.25}
    .calendar-agenda-meta{font-size:12px;color:var(--muted);font-weight:700}
    @media (max-width: 920px){
      .dashboard-actions{width:100%}
      .secondary-cta,.executive-cta{width:100%;min-width:0}
      .calendar-head{align-items:flex-start}
      .calendar-nav{width:100%}
      .calendar-month-label{min-width:0;flex:1}
      .calendar-weekdays,.calendar-grid{gap:6px}
      .calendar-day{min-height:96px;padding:8px}
      .calendar-agenda-item{grid-template-columns:1fr}
    }
    @media (max-width: 920px){
      .executive-columns{grid-template-columns:1fr}
      .executive-cta{width:100%;min-width:0}
    }
    .month-card{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:14px 16px;
      border:1px solid #e2eaf4;
      border-radius:14px;
      background:#fff;
      cursor:pointer;
      text-align:left;
      box-shadow:0 4px 12px rgba(15,23,42,.03);
    }
    .month-card:hover{transform:translateY(-1px);border-color:#cfd9ea}
    .month-card.active{border-color:#bfd1f3;background:#f8fbff}
    .month-label{font-size:15px;font-weight:800;color:var(--text)}
    .month-count{font-size:13px;font-weight:700;color:var(--muted)}
    .card-title{margin:0 0 10px;font-size:20px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .card-meta{color:var(--muted);font-size:14px;font-weight:700}
    .accountable-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:34px;
      min-height:28px;
      padding:4px 8px;
      border-radius:999px;
      background:#eef3fa;
      color:#476079;
      font-size:12px;
      font-weight:800;
      letter-spacing:.04em;
      text-transform:uppercase;
      border:1px solid #d8e3f1;
    }
    .detail-title .accountable-badge{
      cursor:pointer;
      transition:.16s ease;
    }
    .detail-title .accountable-badge:hover{
      background:#dbe7ff;
      border-color:#bfd1f3;
    }

    .detail-panel{padding:18px;display:grid;gap:14px}
    .detail-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
    .detail-title{margin:0 0 10px;font-size:26px;font-weight:800;letter-spacing:-.03em;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .save-indicator{color:var(--muted);font-size:13px;font-weight:700;min-height:20px}

    .detail-stack{display:grid;gap:10px}

    .task-overview{
      display:grid;
      gap:10px;
    }

    .section-card{overflow:hidden;background:linear-gradient(180deg,#fff 0%, #fbfcfe 100%)}
    .section-card.empty{box-shadow:none;background:rgba(255,255,255,.72)}
    .section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      cursor:pointer;
      border-bottom:1px solid transparent;
      min-height:54px;
    }
    .section-card.open .section-head{border-bottom-color:#eef2f7}
    .section-card.empty .section-head{min-height:46px;padding-top:10px;padding-bottom:10px}

    .section-title{min-width:0;display:flex;align-items:center;gap:10px}
    .section-title h3{margin:0;font-size:15px;font-weight:800;letter-spacing:-.01em}
    .count-pill{
      display:inline-flex;align-items:center;justify-content:center;min-width:28px;
      padding:5px 9px;border-radius:999px;font-size:12px;font-weight:800;line-height:1;
      background:#eef3fa;color:#476079;
    }
    .section-card.empty .count-pill{background:#f3f5f8;color:#7a8697}

    .section-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .icon-btn{
      width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;
      border-radius:999px;padding:0;font-size:18px;line-height:1;background:#f5f7fb;border:1px solid #e6ebf3;
      box-shadow:none;
    }
    .icon-btn:hover{transform:none;background:#eef3fa}
    .add-note-btn{padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.2;background:#f5f7fb;border:1px solid #e6ebf3;box-shadow:none}
    .add-note-btn:hover{transform:none;background:#eef3fa}

    .section-body{display:none;padding:0 14px 14px;gap:10px}
    .section-card.open .section-body{display:grid}

    .deadline-summary{padding:14px}
    .deadline-summary-grid{display:grid;gap:8px}
    .deadline-summary-item{
      display:grid;
      grid-template-columns:minmax(120px,1.2fr) minmax(90px,.7fr) minmax(110px,.9fr) minmax(110px,.9fr) minmax(180px,1.2fr);
      gap:10px;
      padding:10px 12px;
      border:1px solid #e7edf5;
      border-radius:12px;
      background:#fff;
      font-size:14px;
      align-items:start;
    }
    .deadline-summary-entry{cursor:pointer;transition:.16s ease}
    .deadline-summary-entry:hover{border-color:#cfd9ea;transform:translateY(-1px)}
    .deadline-summary-entry.active{border-color:#bfd1f3;background:#f8fbff}
    .deadline-summary-entry.deadline-soon{border-color:#f2c27c;background:#fff5e8}
    .deadline-summary-entry.deadline-overdue{border-color:#e59d98;background:#fff0ef}
    .deadline-summary-head{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
    .deadline-summary-notes{white-space:pre-wrap;word-break:break-word;line-height:1.4;color:#425066}

    .input-row{display:none;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px 12px}
    .input-row.visible{display:flex}
    .input-row input{border:0;outline:none;width:100%;background:transparent;color:var(--text);font:inherit;font-size:14px}

    .notes-list{display:grid;gap:8px}
    .note-item{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid #e7edf5;border-radius:12px;background:#fff}
    .note-text{white-space:pre-wrap;word-break:break-word;line-height:1.4;font-size:14px;flex:1;min-width:0}
    .delete-note{border:0;background:transparent;color:var(--danger);box-shadow:none;padding:2px 4px;font-size:18px;line-height:1;border-radius:8px;min-width:auto;flex-shrink:0}
    .delete-note:hover{background:var(--danger-soft);transform:none}

    .deadline-block{
      border:1px solid #d7e1f0;
      background:linear-gradient(180deg,#f7faff 0%, #eef4ff 100%);
      padding:16px;
      margin-top:8px;
      border-radius:16px;
      box-shadow:0 10px 24px rgba(31,79,163,.06);
    }
    .deadline-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    .deadline-title{margin:0;font-size:16px;font-weight:800;color:var(--accent)}
    .deadline-grid{display:grid;gap:12px}
    .deadline-card{padding:14px;display:grid;gap:10px;background:#fff}
    .deadline-editor-row{margin-top:8px;position:relative;z-index:2}
    .deadline-fields{display:grid;gap:10px;grid-template-columns:1.2fr .7fr .9fr .9fr}
    .deadline-card input,.deadline-card select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 11px;background:#fff;color:var(--text);font:inherit}
    .deadline-card textarea{width:100%;min-height:78px;resize:vertical;border:1px solid var(--line);border-radius:10px;padding:10px 11px;background:#fff;color:var(--text);font:inherit}
    .deadline-actions{display:flex;justify-content:flex-end}
    .empty{color:var(--muted);font-size:14px;font-weight:700;padding:2px 2px}

    @media (max-width: 920px){
      .deadline-fields{grid-template-columns:1fr}
      .deadline-summary-item{grid-template-columns:1fr}
      .alert-item{grid-template-columns:1fr}
      .home-toggle-row{grid-template-columns:1fr}
    }

    .admin-btn{padding:7px 10px;font-size:12px;font-weight:800;border-radius:999px;background:rgba(255,255,255,.75);color:var(--muted)}
    .admin-btn.active{background:#edf7ed;color:#1f6b2a;border-color:#b9dfbf}
    .readonly-chip{display:inline-flex;align-items:center;justify-content:center;padding:7px 10px;border-radius:999px;background:#f4f6f9;color:var(--muted);font-size:12px;font-weight:900;border:1px solid #e2e8f0}
    .admin-only{display:none !important}
    .shared-source-panel{display:grid;gap:8px;padding:14px 16px;border:1px solid #e3ebf6;border-radius:18px;background:#fff;box-shadow:0 8px 20px rgba(15,23,42,.04);max-width:720px}
    .shared-source-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .shared-source-label{font-size:12px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
    .shared-source-badge{display:inline-flex;align-items:center;justify-content:center;padding:7px 10px;border-radius:999px;background:#eef3fa;color:#476079;font-size:12px;font-weight:900;white-space:nowrap}
    .shared-source-text{font-size:14px;line-height:1.45;color:#516072;font-weight:600}
    .shared-source-admin-note{font-size:13px;line-height:1.45;color:#425066;background:#f8fbff;border:1px solid #dbe8ff;border-radius:12px;padding:10px 12px}
    .source-local .shared-source-badge{background:#fff3e8;color:#9a4d00}
    .source-local{border-color:#f0d6b3;background:#fffdf9}
    .source-shared .shared-source-badge{background:#edf7ed;color:#1f6b2a}
    .source-shared{border-color:#cfe7d2}
    .source-default .shared-source-badge{background:#f4f6f9;color:#5b6878}
    .source-default{border-color:#e2e8f0}

  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="topbar-left" id="breadcrumbs"></div>
      <div class="topbar-right">
        <button id="fullscreenBtn" type="button">Plein écran</button>
        <span class="readonly-chip" id="modeChip">Consultation</span>
        <button id="adminBtn" class="admin-btn" type="button">Admin</button>
      </div>
    </div>
    <div id="screen"></div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>
    const STORAGE_KEY = 'suivi_taches_hotel_v11_accountable_reset';
    const LOCAL_DATA_KEY = 'suivi_taches_shared_working_copy';
    const ADMIN_SESSION_KEY = 'suivi_taches_admin_mode';
    const ADMIN_CODE = 'admin2026';
    const SHARED_DATA_URL = './data.json';
    const PARAM_DEFS = [
      { key: 'prestataire', label: 'Prestataire / fournisseur' },
      { key: 'produit', label: 'Produit / matériel' },
      { key: 'procedure', label: 'Procédure' },
      { key: 'stock', label: 'Gestion du stock' },
      { key: 'urgence', label: 'En cas d’urgence' }
    ];

    function createTask(category, name) {
      return {
        id: slugify(category + '-' + name),
        category,
        name,
        accountable: '',
        sections: Object.fromEntries(PARAM_DEFS.map(p => [p.key, { notes: [] }])),
        ui: Object.fromEntries(PARAM_DEFS.map(p => [p.key, { open: false, input: false }])),
        deadlines: [],
        deadlineUi: { editIndex: -1 }
      };
    }

    const defaultData = {
      categories: [
        { name: 'Nettoyage', tasks: [createTask('Nettoyage', 'Moquettes'), createTask('Nettoyage', 'Matelas')] },
        { name: 'Appareils', tasks: [createTask('Appareils', 'Fers à repasser'), createTask('Appareils', 'Écrans des salles')] },
        { name: 'Déchets', tasks: [createTask('Déchets', 'Parc à containers'), createTask('Déchets', 'Réception')] }
      ]
    };

    function createBaseView(overrides = {}) {
      return {
        screen: 'dashboard',
        categoryId: null,
        taskId: null,
        showUpcomingDeadlines: false,
        showCompletedTasks: false,
        homePriorityFilter: 'critical',
        allTasksAccountableFilter: 'all',
        allTasksCategoryFilter: 'all',
        calendarMonthOffset: 0,
        ...overrides
      };
    }

    let data = deepClone(defaultData);
    let currentDataSource = 'default';
    let view = createBaseView();
    let isAdminMode = sessionStorage.getItem(ADMIN_SESSION_KEY) === '1';

    function setAdminMode(nextState) {
      isAdminMode = !!nextState;
      sessionStorage.setItem(ADMIN_SESSION_KEY, isAdminMode ? '1' : '0');
      updateAdminUi();
    }

    function ensureAdminAccess() {
      if (isAdminMode) return true;
      alert('Mode consultation uniquement. Cliquez sur Admin pour modifier.');
      return false;
    }

    function promptAdminAccess() {
      if (isAdminMode) {
        const shouldExit = confirm('Quitter le mode admin ?');
        if (!shouldExit) return;
        setAdminMode(false);
        render();
        return;
      }
      const code = window.prompt('Code admin :');
      if (code === null) return;
      if (code === ADMIN_CODE) {
        setAdminMode(true);
        render();
        return;
      }
      alert('Code incorrect.');
    }

    function updateAdminUi() {
      const modeChip = document.getElementById('modeChip');
      const adminBtn = document.getElementById('adminBtn');
      if (modeChip) modeChip.textContent = isAdminMode ? 'Admin' : 'Consultation';
      if (adminBtn) adminBtn.classList.toggle('active', isAdminMode);
      document.querySelectorAll('.admin-only').forEach(el => {
        if (!isAdminMode) {
          el.style.display = 'none';
          return;
        }
        if (el.tagName === 'LABEL') el.style.display = 'inline-flex';
        else el.style.display = 'inline-flex';
      });
    }

    function slugify(value) {
      return value.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/(^-|-$)/g, '');
    }

    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function migrateData(raw) {
      const source = raw && raw.categories ? raw : deepClone(defaultData);
      source.categories = (source.categories || []).map(category => {
        category.tasks = (category.tasks || []).map(task => migrateTask(task, category.name));
        return category;
      });
      return source;
    }

    function migrateTask(task, categoryName) {
      const t = { ...task };
      t.category = t.category || categoryName || '';
      t.id = t.id || slugify((t.category || '') + '-' + (t.name || 'tache'));
      t.accountable = String(t.accountable || '').trim().toUpperCase().slice(0, 8);
      const sections = {};
      PARAM_DEFS.forEach(({ key }) => {
        const existing = t.sections && t.sections[key];
        if (existing && typeof existing === 'object') {
          sections[key] = { notes: Array.isArray(existing.notes) ? existing.notes.filter(Boolean) : [] };
        } else if (key in t) {
          sections[key] = {
            notes: String(t[key] || '').split(/\r?\n+/).map(v => v.trim()).filter(Boolean)
          };
        } else {
          sections[key] = { notes: [] };
        }
      });
      t.sections = sections;
      t.ui = PARAM_DEFS.reduce((acc, p) => {
        const oldVal = t.ui && t.ui[p.key];
        if (oldVal && typeof oldVal === 'object') acc[p.key] = { open: !!oldVal.open, input: !!oldVal.input };
        else acc[p.key] = { open: !!oldVal, input: false };
        return acc;
      }, {});
      if (!t.ui.deadlines || typeof t.ui.deadlines !== 'object') t.ui.deadlines = { open: false };
      else t.ui.deadlines = { open: !!t.ui.deadlines.open };
      t.deadlines = Array.isArray(t.deadlines) ? t.deadlines.map(d => ({
        label: d.label || '',
        date: d.date || '',
        status: d.status || '',
        priority: getDeadlinePriorityValue(d.priority),
        notes: d.notes || '',
        notesOpen: !!(d.notes && String(d.notes).trim())
      })) : [];
      t.deadlineUi = {
        editIndex: t.deadlineUi && Number.isInteger(t.deadlineUi.editIndex) ? t.deadlineUi.editIndex : -1
      };
      if (t.deadlineUi.editIndex >= t.deadlines.length) t.deadlineUi.editIndex = -1;
      ['prestataire','produit','procedure','stock','urgence','commentaires'].forEach(k => delete t[k]);
      return t;
    }

    async function loadData() {
      try {
        const localDraft = localStorage.getItem(LOCAL_DATA_KEY);
        if (localDraft) {
          currentDataSource = 'local';
          return migrateData(JSON.parse(localDraft));
        }
      } catch {}

      try {
        const response = await fetch(`${SHARED_DATA_URL}?v=${Date.now()}`, { cache: 'no-store' });
        if (response.ok) {
          const sharedRaw = await response.json();
          currentDataSource = 'shared';
          return migrateData(sharedRaw);
        }
      } catch {}

      try {
        const legacyRaw = localStorage.getItem(STORAGE_KEY);
        if (legacyRaw) {
          currentDataSource = 'legacy';
          return migrateData(JSON.parse(legacyRaw));
        }
      } catch {}

      currentDataSource = 'default';
      return deepClone(defaultData);
    }

    function persistLocalWorkingCopy() {
      localStorage.setItem(LOCAL_DATA_KEY, JSON.stringify(data));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      currentDataSource = 'local';
    }

    function saveData(message = 'Enregistré') {
      persistLocalWorkingCopy();
      const el = document.getElementById('saveIndicator');
      if (el) {
        el.textContent = message;
        clearTimeout(saveData._timer);
        saveData._timer = setTimeout(() => {
          const current = document.getElementById('saveIndicator');
          if (current) current.textContent = '';
        }, 1200);
      }
    }

    function getDataSourceMeta() {
      if (currentDataSource === 'shared') {
        return {
          label: 'JSON partagé',
          detail: 'Tout le monde consulte les données de data.json.',
          tone: 'shared'
        };
      }
      if (currentDataSource === 'local') {
        return {
          label: 'Copie locale admin',
          detail: 'Cette version modifiée est visible seulement sur ce navigateur tant que tu ne republies pas le nouveau data.json.',
          tone: 'local'
        };
      }
      if (currentDataSource === 'legacy') {
        return {
          label: 'Ancienne copie locale',
          detail: 'Le site a repris une ancienne sauvegarde locale. Tu peux revenir au JSON partagé depuis le dashboard.',
          tone: 'local'
        };
      }
      return {
        label: 'Données intégrées',
        detail: 'Aucun data.json trouvé. Le site utilise les données par défaut intégrées au fichier.',
        tone: 'default'
      };
    }

    function downloadSharedJsonFile() {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'data.json';
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function reloadSharedData() {
      localStorage.removeItem(LOCAL_DATA_KEY);
      localStorage.removeItem(STORAGE_KEY);
      data = await loadData();
      view = createBaseView();
      render();
    }

    async function initializeApp() {
      data = await loadData();
      updateAdminUi();
      render();
    }

    function getCategory(index) {
      return data.categories[index] || null;
    }

    function getTask() {
      const category = getCategory(view.categoryId);
      if (!category) return null;
      return category.tasks.find(t => t.id === view.taskId) || null;
    }


    function getUniqueTaskId(categoryName, taskName, tasks = []) {
      const base = slugify(categoryName + '-' + taskName) || 'tache';
      let candidate = base;
      let counter = 2;
      while (tasks.some(task => task.id === candidate)) {
        candidate = `${base}-${counter}`;
        counter += 1;
      }
      return candidate;
    }

    function addCategory() {
      const name = window.prompt('Nom de la catégorie :');
      if (name === null) return;
      const trimmed = name.trim();
      if (!trimmed) return;
      if (data.categories.some(category => category.name.toLowerCase() === trimmed.toLowerCase())) {
        alert('Cette catégorie existe déjà.');
        return;
      }
      data.categories.push({ name: trimmed, tasks: [] });
      saveData('Catégorie ajoutée');
      render();
    }

    function addTaskToCurrentCategory() {
      const category = getCategory(view.categoryId);
      if (!category) return;
      const name = window.prompt('Nom de la tâche :');
      if (name === null) return;
      const trimmed = name.trim();
      if (!trimmed) return;
      if (category.tasks.some(task => task.name.toLowerCase() === trimmed.toLowerCase())) {
        alert('Cette tâche existe déjà dans cette catégorie.');
        return;
      }
      const task = createTask(category.name, trimmed);
      task.id = getUniqueTaskId(category.name, trimmed, category.tasks);
      category.tasks.push(task);
      saveData('Tâche ajoutée');
      render();
    }

    function renameCurrentCategory() {
      const category = getCategory(view.categoryId);
      if (!category) return;
      const name = window.prompt('Nouveau nom de la catégorie :', category.name || '');
      if (name === null) return;
      const trimmed = name.trim();
      if (!trimmed || trimmed === category.name) return;
      if (data.categories.some((item, index) => index !== view.categoryId && item.name.toLowerCase() === trimmed.toLowerCase())) {
        alert('Cette catégorie existe déjà.');
        return;
      }
      category.name = trimmed;
      category.tasks.forEach((task, index) => {
        task.category = trimmed;
        task.id = getUniqueTaskId(trimmed, task.name, category.tasks.slice(0, index));
      });
      if (view.screen === 'task') {
        const currentTask = getTask();
        if (currentTask) view.taskId = currentTask.id;
      }
      saveData('Catégorie renommée');
      render();
    }

    function renameCurrentTask() {
      const category = getCategory(view.categoryId);
      const task = getTask();
      if (!category || !task) return;
      const name = window.prompt('Nouveau nom de la tâche :', task.name || '');
      if (name === null) return;
      const trimmed = name.trim();
      if (!trimmed || trimmed === task.name) return;
      if (category.tasks.some(item => item !== task && item.name.toLowerCase() === trimmed.toLowerCase())) {
        alert('Cette tâche existe déjà dans cette catégorie.');
        return;
      }
      task.name = trimmed;
      task.id = getUniqueTaskId(category.name, trimmed, category.tasks.filter(item => item !== task));
      view.taskId = task.id;
      saveData('Tâche renommée');
      render();
    }


    function formatAccountable(accountable) {
      const value = String(accountable || '').trim().toUpperCase();
      return value ? `<span class="accountable-badge">${escapeHtml(value)}</span>` : '';
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function render() {
      renderBreadcrumbs();
      const screen = document.getElementById('screen');
      if (view.screen === 'dashboard') screen.innerHTML = renderDashboard();
      if (view.screen === 'calendar') screen.innerHTML = renderCalendarView();
      if (view.screen === 'home') screen.innerHTML = renderHome();
      if (view.screen === 'categories') screen.innerHTML = renderCategoriesList();
      if (view.screen === 'all_tasks') screen.innerHTML = renderAllTasks();
      if (view.screen === 'category') screen.innerHTML = renderCategory();
      if (view.screen === 'task') screen.innerHTML = renderTaskDetail();
      bindEvents();
      updateAdminUi();
    }

    function renderBreadcrumbs() {
      const el = document.getElementById('breadcrumbs');
      const parts = [];
      if (view.screen === 'dashboard') {
        parts.push('<h1 class="title">Suivi des tâches</h1>');
      } else if (view.screen === 'calendar') {
        parts.push('<button class="back-btn" data-nav="dashboard">Retour</button>');
        parts.push('<span class="crumb">Calendrier des échéances</span>');
      } else if (view.screen === 'home') {
        parts.push('<button class="back-btn" data-nav="dashboard">Retour</button>');
        parts.push('<span class="crumb">Accueil opérationnel</span>');
      } else if (view.screen === 'categories') {
        parts.push('<button class="back-btn" data-nav="home">Retour</button>');
        parts.push('<span class="crumb">Catégories</span>');
      } else if (view.screen === 'all_tasks') {
        parts.push('<button class="back-btn" data-nav="home">Retour</button>');
        parts.push('<span class="crumb">Toutes les tâches</span>');
      } else if (view.screen === 'category') {
        const category = getCategory(view.categoryId);
        parts.push('<button class="back-btn" data-nav="categories">Retour</button>');
        parts.push('<span class="crumb">' + escapeHtml(category ? category.name : '') + '</span>');
      } else {
        const category = getCategory(view.categoryId);
        const task = getTask();
        parts.push('<button class="back-btn" data-nav="category">Retour</button>');
        parts.push('<span class="crumb">' + escapeHtml(category ? category.name : '') + '</span>');
        parts.push('<span class="crumb">/</span>');
        parts.push('<span class="crumb">' + escapeHtml(task ? task.name : '') + '</span>');
      }
      el.innerHTML = parts.join('');
    }

    function getExecutiveSummary() {
      const summary = {
        taskCount: 0,
        completedTaskCount: 0,
        taskWithoutAccountableCount: 0,
        totalDeadlineCount: 0,
        overdueCount: 0,
        soonCount: 0,
        blockedCount: 0,
        highPriorityCount: 0,
        nextDeadlines: [],
        categories: []
      };

      data.categories.forEach((category, categoryIndex) => {
        const tasks = Array.isArray(category.tasks) ? category.tasks : [];
        summary.taskCount += tasks.length;
        summary.categories.push({
          categoryIndex,
          name: category.name || '—',
          taskCount: tasks.length
        });

        tasks.forEach(task => {
          if (isTaskCompleted(task)) summary.completedTaskCount += 1;
          if (!String(task.accountable || '').trim()) summary.taskWithoutAccountableCount += 1;

          (task.deadlines || []).forEach(deadline => {
            summary.totalDeadlineCount += 1;
            const state = getDeadlineVisualState(deadline);
            const priority = getDeadlinePriorityValue(deadline.priority);
            const status = normalizeDeadlineStatus(deadline.status);

            if (priority === 3) summary.highPriorityCount += 1;
            if (state === 'deadline-overdue') summary.overdueCount += 1;
            if (state === 'deadline-soon') summary.soonCount += 1;
            if (status === 'bloque') summary.blockedCount += 1;

            if (!deadline.date || isDeadlineCompleted(deadline)) return;
            const dueDate = toDateValue(deadline.date);
            if (!dueDate) return;
            summary.nextDeadlines.push({
              categoryIndex,
              taskId: task.id,
              taskName: task.name || '—',
              deadlineLabel: deadline.label || '—',
              priority,
              date: deadline.date,
              dueDate,
              state
            });
          });
        });
      });

      summary.categories.sort((a, b) => b.taskCount - a.taskCount || a.name.localeCompare(b.name, 'fr', { sensitivity: 'base' }));
      summary.nextDeadlines.sort((a, b) => a.dueDate - b.dueDate || b.priority - a.priority || a.taskName.localeCompare(b.taskName, 'fr', { sensitivity: 'base' }));
      return summary;
    }


    function getCalendarReferenceDate() {
      const today = getTodayDateValue();
      return new Date(today.getFullYear(), today.getMonth() + (Number(view.calendarMonthOffset) || 0), 1);
    }

    function getCalendarMonthLabel(dateValue) {
      return new Intl.DateTimeFormat('fr-BE', { month: 'long', year: 'numeric' }).format(dateValue);
    }

    function getCalendarDeadlinesForMonth(monthDate) {
      const year = monthDate.getFullYear();
      const month = monthDate.getMonth();
      const items = [];
      data.categories.forEach((category, categoryIndex) => {
        (category.tasks || []).forEach(task => {
          (task.deadlines || []).forEach((deadline, index) => {
            const dueDate = toDateValue(deadline.date);
            if (!dueDate || isDeadlineCompleted(deadline)) return;
            if (dueDate.getFullYear() !== year || dueDate.getMonth() !== month) return;
            items.push({
              categoryIndex,
              taskId: task.id,
              taskName: task.name || '',
              accountable: task.accountable || '',
              deadline,
              index,
              dueDate,
              state: getDeadlineVisualState(deadline),
              priority: getDeadlinePriorityValue(deadline.priority)
            });
          });
        });
      });
      return items.sort((a, b) => a.dueDate - b.dueDate || b.priority - a.priority || a.taskName.localeCompare(b.taskName, 'fr', { sensitivity: 'base' }));
    }

    function getCalendarMatrix(monthDate) {
      const firstDay = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
      const startOffset = (firstDay.getDay() + 6) % 7;
      const gridStart = new Date(firstDay);
      gridStart.setDate(firstDay.getDate() - startOffset);
      const cells = [];
      for (let i = 0; i < 42; i += 1) {
        const date = new Date(gridStart);
        date.setDate(gridStart.getDate() + i);
        cells.push(date);
      }
      return cells;
    }

    function renderCalendarView() {
      const monthDate = getCalendarReferenceDate();
      const items = getCalendarDeadlinesForMonth(monthDate);
      const today = getTodayDateValue();
      const dayMap = new Map();
      items.forEach(item => {
        const key = item.deadline.date;
        if (!dayMap.has(key)) dayMap.set(key, []);
        dayMap.get(key).push(item);
      });
      const weekdayLabels = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
      const monthLabel = getCalendarMonthLabel(monthDate);
      return `
        <div class="view-stack">
          <section class="calendar-panel">
            <div class="calendar-head">
              <div class="calendar-title-wrap">
                <h2 class="calendar-title">Calendrier des échéances</h2>
                <p class="calendar-subtitle">Vue mensuelle de toutes les échéances non terminées. Clic sur une échéance pour ouvrir la tâche, parce qu’apparemment cliquer sur des boîtes reste la base de l’informatique.</p>
              </div>
              <div class="calendar-nav">
                <button type="button" data-calendar-nav="prev">Mois précédent</button>
                <div class="calendar-month-label">${escapeHtml(monthLabel.charAt(0).toUpperCase() + monthLabel.slice(1))}</div>
                <button type="button" data-calendar-nav="next">Mois suivant</button>
              </div>
            </div>

            <div class="calendar-grid-wrap">
              <div class="calendar-weekdays">
                ${weekdayLabels.map(label => `<div class="calendar-weekday">${label}</div>`).join('')}
              </div>
              <div class="calendar-grid">
                ${getCalendarMatrix(monthDate).map(dateValue => {
                  const iso = `${dateValue.getFullYear()}-${String(dateValue.getMonth() + 1).padStart(2, '0')}-${String(dateValue.getDate()).padStart(2, '0')}`;
                  const dayItems = dayMap.get(iso) || [];
                  const isCurrentMonth = dateValue.getMonth() === monthDate.getMonth();
                  const isToday = dateValue.getTime() === today.getTime();
                  return `
                    <div class="calendar-day ${isCurrentMonth ? '' : 'muted'} ${isToday ? 'today' : ''} ${dayItems.length ? 'has-items' : ''}">
                      <div class="calendar-day-number">${dateValue.getDate()}</div>
                      <div class="calendar-day-list">
                        ${dayItems.slice(0, 3).map(item => `
                          <button type="button" class="calendar-pill ${item.state === 'deadline-overdue' ? 'alert-overdue' : item.state === 'deadline-soon' ? 'alert-soon' : ''}" data-open-home-alert-task="${item.categoryIndex}" data-task-id="${escapeHtml(item.taskId)}" title="Ouvrir la tâche">
                            ${escapeHtml(item.deadline.label || item.taskName || 'Échéance')}
                          </button>
                        `).join('')}
                        ${dayItems.length > 3 ? `<div class="calendar-pill-more">+${dayItems.length - 3} autre${dayItems.length - 3 > 1 ? 's' : ''}</div>` : ''}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>

            <section class="calendar-agenda">
              <div class="calendar-agenda-head">
                <h3 class="calendar-agenda-title">Échéances du mois</h3>
                <div class="card-meta">${items.length} échéance${items.length > 1 ? 's' : ''}</div>
              </div>
              <div class="calendar-agenda-list">
                ${items.length ? items.map(item => `
                  <button class="calendar-agenda-item ${item.state === 'deadline-overdue' ? 'alert-overdue' : item.state === 'deadline-soon' ? 'alert-soon' : ''}" type="button" data-open-home-alert-task="${item.categoryIndex}" data-task-id="${escapeHtml(item.taskId)}" title="Ouvrir la tâche">
                    <div class="calendar-agenda-main">
                      <div class="calendar-agenda-task">${escapeHtml(item.taskName || '—')} · ${escapeHtml(item.deadline.label || '—')}</div>
                      <div class="calendar-agenda-meta">${escapeHtml(item.accountable || '—')} · ${escapeHtml(formatDisplayDate(item.deadline.date))}</div>
                    </div>
                    <span class="executive-chip">${escapeHtml(formatDeadlinePriority(item.deadline.priority))}</span>
                    <span class="executive-chip">${escapeHtml(item.deadline.status || 'À faire')}</span>
                    <span class="card-meta">${escapeHtml(item.deadline.notes || '—')}</span>
                  </button>
                `).join('') : '<div class="empty">Aucune échéance non terminée sur ce mois</div>'}
              </div>
            </section>
          </section>
        </div>
      `;
    }

    function renderDashboard() {
      const summary = getExecutiveSummary();
      const nextDeadlines = summary.nextDeadlines.slice(0, 6);
      const topCategories = summary.categories.slice(0, 6);
      return `
        <div class="view-stack">
          <section class="executive-panel">
            <div class="executive-hero">
              <div class="executive-title-wrap">
                <div class="executive-kicker">Résumé exécutif</div>
              </div>
              <div class="dashboard-actions">
                ${isAdminMode ? `
                  <button id="dashboardExportBtn" type="button">Exporter Excel</button>
                  <label class="file-label" id="dashboardImportLabel">
                    Importer Excel
                    <input type="file" id="dashboardImportFile" accept=".xlsx,.xls" />
                  </label>
                  <button id="dashboardDownloadJsonBtn" type="button">Télécharger data.json</button>

    function toDateValue(dateString) {
      if (!dateString) return null;
      const match = String(dateString).match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) return null;
      const [, year, month, day] = match;
      return new Date(Number(year), Number(month) - 1, Number(day));
    }

    function getTodayDateValue() {
      const today = new Date();
      return new Date(today.getFullYear(), today.getMonth(), today.getDate());
    }

    function getDeadlineVisualState(deadline) {
      if (!deadline || !deadline.date || isDeadlineCompleted(deadline)) return '';
      const dueDate = toDateValue(deadline.date);
      if (!dueDate) return '';
      const today = getTodayDateValue();
      const diffDays = Math.round((dueDate - today) / 86400000);
      if (diffDays < 0) return 'deadline-overdue';
      if (diffDays <= 7) return 'deadline-soon';
      return '';
    }

    function getSortedDeadlines(task) {
      return (task.deadlines || [])
        .map((deadline, index) => ({ deadline, index, state: getDeadlineVisualState(deadline) }))
        .sort((a, b) => {
          const dateA = toDateValue(a.deadline.date);
          const dateB = toDateValue(b.deadline.date);
          if (dateA && dateB) return dateA - dateB;
          if (dateA) return -1;
          if (dateB) return 1;
          return a.index - b.index;
        });
    }

    function getHomeAlertDeadlines() {
      const items = [];
      data.categories.forEach((category, categoryIndex) => {
        (category.tasks || []).forEach(task => {
          (task.deadlines || []).forEach((deadline, index) => {
            const state = getDeadlineVisualState(deadline);
            if (!state || !matchesHomePriorityFilter(deadline)) return;
            items.push({
              categoryIndex,
              taskId: task.id,
              taskName: task.name || '',
              deadline,
              state,
              index
            });
          });
        });
      });
      return items.sort((a, b) => {
        const dateA = toDateValue(a.deadline.date);
        const dateB = toDateValue(b.deadline.date);
        if (dateA && dateB) return dateA - dateB;
        if (dateA) return -1;
        if (dateB) return 1;
        return 0;
      });
    }


    function formatDisplayDate(dateString) {
      const dateValue = toDateValue(dateString);
      if (!dateValue) return dateString || '—';
      return new Intl.DateTimeFormat('fr-BE', { day: '2-digit', month: '2-digit', year: 'numeric' }).format(dateValue);
    }

    function getDeadlinePriorityValue(priority) {
      const value = Number(priority);
      if (value >= 3) return 3;
      if (value >= 2) return 2;
      if (value >= 1) return 1;
      return 0;
    }

    function formatDeadlinePriority(priority) {
      const value = getDeadlinePriorityValue(priority);
      return value ? '★'.repeat(value) : '—';
    }

    function matchesHomePriorityFilter(deadline) {
      const filter = view.homePriorityFilter === 'all' ? 'all' : 'critical';
      const priority = getDeadlinePriorityValue(deadline && deadline.priority);
      return filter === 'all' ? priority >= 1 || priority === 0 : priority === 3;
    }

    function normalizeDeadlineStatus(status) {
      return String(status || '')
        .trim()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[̀-ͯ]/g, '');
    }

    function isDeadlineCompleted(deadline) {
      return normalizeDeadlineStatus(deadline && deadline.status) === 'termine';
    }

    function isTaskCompleted(task) {
      const deadlines = Array.isArray(task && task.deadlines) ? task.deadlines : [];
      return deadlines.length > 0 && deadlines.every(deadline => isDeadlineCompleted(deadline));
    }

    function getCompletedTasks() {
      const items = [];
      data.categories.forEach((category, categoryIndex) => {
        (category.tasks || []).forEach(task => {
          const completedDeadlines = (task.deadlines || []).filter(deadline => isDeadlineCompleted(deadline));
          if (!completedDeadlines.length) return;
          const sortedDeadlines = completedDeadlines.slice().sort((a, b) => {
            const dateA = toDateValue(a.date);
            const dateB = toDateValue(b.date);
            if (dateA && dateB) return dateB - dateA;
            if (dateA) return -1;
            if (dateB) return 1;
            return 0;
          });
          items.push({
            categoryIndex,
            taskId: task.id,
            taskName: task.name || '',
            accountable: task.accountable || '',
            lastCompletedDate: sortedDeadlines.length ? toDateValue(sortedDeadlines[0].date) : null,
            lastCompletedDateRaw: sortedDeadlines.length ? (sortedDeadlines[0].date || '') : '',
            latestStep: sortedDeadlines.length ? (sortedDeadlines[0].label || '') : '',
            latestPriority: sortedDeadlines.length ? getDeadlinePriorityValue(sortedDeadlines[0].priority) : 0,
            notes: sortedDeadlines.length ? (sortedDeadlines[0].notes || '') : '',
            deadlineCount: sortedDeadlines.length
          });
        });
      });
      return items.sort((a, b) => {
        if (a.lastCompletedDate && b.lastCompletedDate) return b.lastCompletedDate - a.lastCompletedDate;
        if (a.lastCompletedDate) return -1;
        if (b.lastCompletedDate) return 1;
        return a.taskName.localeCompare(b.taskName, 'fr', { sensitivity: 'base' });
      });
    }

    function getUpcomingDeadlines() {
      const items = [];
      data.categories.forEach((category, categoryIndex) => {
        (category.tasks || []).forEach(task => {
          if (isTaskCompleted(task)) return;
          (task.deadlines || []).forEach((deadline, index) => {
            const dueDate = toDateValue(deadline.date);
            if (!dueDate || isDeadlineCompleted(deadline) || !matchesHomePriorityFilter(deadline)) return;
            items.push({
              categoryIndex,
              taskId: task.id,
              taskName: task.name || '',
              accountable: task.accountable || '',
              deadline,
              state: getDeadlineVisualState(deadline),
              index,
              dueDate
            });
          });
        });
      });
      return items.sort((a, b) => {
        if (a.dueDate && b.dueDate) return a.dueDate - b.dueDate;
        if (a.dueDate) return -1;
        if (b.dueDate) return 1;
        return a.index - b.index;
      });
    }

    function renderHomeUpcomingDeadlines() {
      const upcomingItems = getUpcomingDeadlines();
      const completedTasks = getCompletedTasks();
      const isUpcomingOpen = !!view.showUpcomingDeadlines;
      const isCompletedOpen = !!view.showCompletedTasks;
      return `
        <div class="alert-list">

    function renderHomeUpcomingDeadlinesList(items) {

    function renderCompletedTasksList(items) {

      return `

            <div>Dernière étape</div>

    function renderHomeDeadlineReport() {
      const items = getHomeAlertDeadlines();
      if (!items.length) return '<div class="empty">Aucune deadline proche ou dépassée</div>';
      return `
        <div class="alert-list">
          <div class="alert-item alert-head">
            <div>Tâche</div>
            <div>Étape</div>
            <div>Priorité</div>
            <div>Date</div>
            <div>Notes</div>

          ${items.map(({ categoryIndex, taskId, taskName, deadline, state }) => `

              data-task-id="${escapeHtml(taskId)}"
              type="button"

              <div>${escapeHtml(deadline.label || '—')}</div>

    function renderSectionCard(task, key, label) {
      const notes = task.sections[key].notes || [];
      const ui = task.ui[key] || { open: false, input: false };
      const isEmpty = notes.length === 0;
      const isOpen = ui.open;
      const inputVisible = ui.input;
      return `
        <section class="section-card ${isOpen ? 'open' : ''} ${isEmpty ? 'empty' : ''}" data-section="${key}">
          <div class="section-head" data-toggle-section="${key}">
            <div class="section-title">

            </div>

            </div>

              <input type="text" data-note-input="${key}" placeholder="Saisir puis Entrée" />
            </div>
            <div class="notes-list">
              ${notes.length ? notes.map((note, index) => `
                <div class="note-item">
                  <div class="note-text">${escapeHtml(note)}</div>
                  ${isAdminMode ? `<button class=\"delete-note\" type=\"button\" title=\"Supprimer\" aria-label=\"Supprimer\" data-delete-section-note=\"${key}\" data-note-index=\"${index}\">&times;</button>` : ''}
                </div>
