    function renderDeadlineSummary(task) {
      if (!task.deadlines.length) return '<div class="empty">Aucune deadline</div>';
      return `
        <div class="deadline-summary-grid">
          <div class="deadline-summary-item deadline-summary-head">
            <div>Étape</div>
            <div>Priorité</div>
            <div>Date</div>
            <div>Statut</div>
            <div>Notes</div>
          </div>
          ${getSortedDeadlines(task).map(({ deadline, index, state }) => `
            <div>
              <div class="deadline-summary-item deadline-summary-entry ${task.deadlineUi && task.deadlineUi.editIndex === index ? 'active' : ''} ${state}" ${isAdminMode ? `data-edit-deadline="${index}" role="button" tabindex="0"` : ''}>
                <div>${escapeHtml(deadline.label || '—')}</div>
                <div>${escapeHtml(formatDeadlinePriority(deadline.priority))}</div>
                <div>${escapeHtml(formatDisplayDate(deadline.date))}</div>
                <div>${escapeHtml(deadline.status || '—')}</div>
                <div class="deadline-summary-notes">${escapeHtml(deadline.notes || '—')}</div>
              </div>
              ${isAdminMode && task.deadlineUi && task.deadlineUi.editIndex === index ? `
                <div class="deadline-editor-row" data-deadline-editor-row="1">
                  ${renderDeadlineEditor(task, index)}
                </div>
              ` : ''}
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderDeadlineEditor(task, index) {
      if (index < 0 || index >= task.deadlines.length) return '';
      const deadline = task.deadlines[index];
      const notesVisible = !!deadline.notesOpen || !!(deadline.notes && String(deadline.notes).trim());
      return `
        <article class="deadline-card">
          <div class="deadline-fields">
            <input type="text" placeholder="Étape" value="${escapeHtml(deadline.label || '')}" data-deadline-field="label" data-deadline-index="${index}" data-deadline-primary="1" />
            <select data-deadline-field="priority" data-deadline-index="${index}">
              ${[
                { value: '0', label: 'Priorité' },
                { value: '1', label: '★' },
                { value: '2', label: '★★' },
                { value: '3', label: '★★★' }
              ].map(option => `
                <option value="${option.value}" ${String(getDeadlinePriorityValue(deadline.priority)) === option.value ? 'selected' : ''}>${option.label}</option>
              `).join('')}
            </select>
            <input type="date" value="${escapeHtml(deadline.date || '')}" data-deadline-field="date" data-deadline-index="${index}" />
            <select data-deadline-field="status" data-deadline-index="${index}">
              ${['','À faire','À étudier','En cours','Bloqué','En attente','Terminé'].map(status => `
                <option value="${escapeHtml(status)}" ${deadline.status === status ? 'selected' : ''}>${escapeHtml(status || 'Statut')}</option>
              `).join('')}
            </select>
          </div>
          ${notesVisible ? `<textarea placeholder="Notes" data-deadline-field="notes" data-deadline-index="${index}">${escapeHtml(deadline.notes || '')}</textarea>` : ''}
          <div class="deadline-actions">
            ${isAdminMode ? `<button class=\"add-note-btn\" type=\"button\" title=\"Ajouter une note\" aria-label=\"Ajouter une note\" data-show-deadline-notes=\"${index}\">Ajouter une note</button>
            <button class=\"delete-note\" type=\"button\" title=\"Supprimer\" aria-label=\"Supprimer\" data-delete-deadline=\"${index}\">&times;</button>` : ''}
          </div>
        </article>
      `;
    }


    function goBack() {
      if (view.screen === 'task') {
        view = createBaseView({ screen: 'category', categoryId: view.categoryId, homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
      } else if (view.screen === 'category') {
        view = createBaseView({ screen: 'categories', homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
      } else if (view.screen === 'categories' || view.screen === 'all_tasks') {
        view = createBaseView({ screen: 'dashboard', homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
      } else {
        return;
      }
      render();
    }

    function shouldIgnoreKeyboardNavigation(event) {
      if (event.defaultPrevented) return true;
      if (event.altKey || event.ctrlKey || event.metaKey || event.shiftKey) return true;
      const target = event.target;
      if (!target) return false;
      const tag = (target.tagName || '').toUpperCase();
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return true;
      if (target.isContentEditable) return true;
      return false;
    }

    function openTaskView(categoryIndex, taskId) {
      const category = getCategory(categoryIndex);
      const nextTask = category ? category.tasks.find(t => t.id === taskId) : null;
      if (!nextTask) return;
      Object.keys(nextTask.ui || {}).forEach(uiKey => {
        if (nextTask.ui[uiKey] && typeof nextTask.ui[uiKey] === 'object') {
          nextTask.ui[uiKey].open = false;
          nextTask.ui[uiKey].input = false;
        }
      });
      nextTask.deadlineUi = { editIndex: -1 };
      view = createBaseView({ screen: 'task', categoryId: categoryIndex, taskId, homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
      render();
    }

    function goToNextTask() {
      if (view.screen !== 'task') return;
      const tasks = getAllTasksAlphabetical();
      if (!Array.isArray(tasks) || !tasks.length) return;
      const currentIndex = tasks.findIndex(item => item.categoryIndex === view.categoryId && item.taskId === view.taskId);
      if (currentIndex < 0 || currentIndex >= tasks.length - 1) return;
      const nextTask = tasks[currentIndex + 1];
      if (!nextTask) return;
      openTaskView(nextTask.categoryIndex, nextTask.taskId);
    }

    function goToPreviousTask() {
      if (view.screen !== 'task') return;
      const tasks = getAllTasksAlphabetical();
      if (!Array.isArray(tasks) || !tasks.length) return;
      const currentIndex = tasks.findIndex(item => item.categoryIndex === view.categoryId && item.taskId === view.taskId);
      if (currentIndex <= 0) return;
      const prevTask = tasks[currentIndex - 1];
      if (!prevTask) return;
      openTaskView(prevTask.categoryIndex, prevTask.taskId);
    }

    function goForwardPage() {
      if (view.screen === 'dashboard') {
        view = createBaseView({ screen: 'home', homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
      } else if (view.screen === 'home') {
        view = createBaseView({ screen: 'categories', homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
      } else if (view.screen === 'categories') {
        view = createBaseView({ screen: 'all_tasks', homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
      } else if (view.screen === 'all_tasks') {
        const first = getAllTasksAlphabetical()[0];
        if (!first) return;
        openTaskView(first.categoryIndex, first.taskId);
        return;
      } else {
        return;
      }
      render();
    }

    function goBackPage() {
      if (view.screen === 'task') {
        view = createBaseView({ screen: 'all_tasks', homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
      } else if (view.screen === 'all_tasks') {
        view = createBaseView({ screen: 'categories', homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
      } else if (view.screen === 'categories') {
        view = createBaseView({ screen: 'home', homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
      } else if (view.screen === 'home') {
        view = createBaseView({ screen: 'dashboard', homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
      } else {
        return;
      }
      render();
    }

    function updateFullscreenUi() {
      const fullscreenBtn = document.getElementById('fullscreenBtn');
      if (!fullscreenBtn) return;
      fullscreenBtn.textContent = document.fullscreenElement ? 'Quitter le plein écran' : 'Plein écran';
    }

    async function toggleFullscreen() {
      try {
        if (document.fullscreenElement) await document.exitFullscreen();
        else await document.documentElement.requestFullscreen();
      } catch (error) {
        alert('Le plein écran est indisponible sur ce navigateur.');
      }
    }

    function bindEvents() {
      const adminBtn = document.getElementById('adminBtn');
      if (adminBtn) adminBtn.onclick = () => promptAdminAccess();

      const fullscreenBtn = document.getElementById('fullscreenBtn');
      if (fullscreenBtn) fullscreenBtn.onclick = () => toggleFullscreen();
      updateFullscreenUi();

      document.querySelectorAll('[data-nav]').forEach(btn => {
        btn.onclick = () => {
          if (btn.dataset.nav === 'dashboard') {
            view = createBaseView({ screen: 'dashboard', homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
            render();
            return;
          }
          if (btn.dataset.nav === 'calendar') {
            view = createBaseView({ screen: 'calendar', homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
            render();
            return;
          }
          if (btn.dataset.nav === 'home') {
            view = createBaseView({ screen: 'home', showUpcomingDeadlines: view.showUpcomingDeadlines, showCompletedTasks: view.showCompletedTasks, homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
            render();
            return;
          }
          if (btn.dataset.nav === 'categories') {
            view = createBaseView({ screen: 'categories', homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
            render();
            return;
          }
          if (btn.dataset.nav === 'all_tasks') {
            view = createBaseView({ screen: 'all_tasks', homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
            render();
            return;
          }
          if (btn.dataset.nav === 'category') {
            goBack();
            return;
          }
        };
      });

      document.querySelectorAll('[data-add-category]').forEach(btn => {
        btn.onclick = () => {
          if (!ensureAdminAccess()) return;
          addCategory();
        };
      });

      document.querySelectorAll('[data-add-task]').forEach(btn => {
        btn.onclick = () => {
          if (!ensureAdminAccess()) return;
          addTaskToCurrentCategory();
        };
      });

      document.querySelectorAll('[data-rename-category]').forEach(btn => {
        btn.onclick = () => {
          if (!ensureAdminAccess()) return;
          renameCurrentCategory();
        };
      });

      document.querySelectorAll('[data-rename-task]').forEach(btn => {
        btn.onclick = () => {
          if (!ensureAdminAccess()) return;
          renameCurrentTask();
        };
      });

      document.querySelectorAll('[data-open-category]').forEach(card => {
        card.onclick = () => {
          view = createBaseView({ screen: 'category', categoryId: Number(card.dataset.openCategory), homePriorityFilter: view.homePriorityFilter, allTasksAccountableFilter: view.allTasksAccountableFilter, allTasksCategoryFilter: view.allTasksCategoryFilter, calendarMonthOffset: view.calendarMonthOffset || 0 });
          render();
        };
      });

      document.querySelectorAll('[data-open-task]').forEach(card => {
        card.onclick = () => {
          openTaskView(view.categoryId, card.dataset.openTask);
        };
      });

      document.querySelectorAll('[data-open-task-global]').forEach(card => {
        card.onclick = () => {
          openTaskView(Number(card.dataset.openTaskGlobal), card.dataset.taskId);
        };
      });

      document.querySelectorAll('[data-open-home-alert-task]').forEach(card => {
        card.onclick = () => {
          openTaskView(Number(card.dataset.openHomeAlertTask), card.dataset.taskId);
        };
      });

      document.querySelectorAll('[data-toggle-home-priority-filter]').forEach(btn => {
        btn.onclick = () => {
          view.homePriorityFilter = view.homePriorityFilter === 'all' ? 'critical' : 'all';
          render();
        };
      });

      document.querySelectorAll('[data-filter-all-tasks-category]').forEach(select => {
        select.onchange = () => {
          view.allTasksCategoryFilter = select.value || 'all';
          render();
        };
      });

      document.querySelectorAll('[data-filter-all-tasks-accountable]').forEach(select => {
        select.onchange = () => {
          view.allTasksAccountableFilter = select.value || 'all';
          render();
        };
      });

      document.querySelectorAll('[data-toggle-upcoming-deadlines]').forEach(btn => {
        btn.onclick = () => {
          const nextState = !view.showUpcomingDeadlines;
          view.showUpcomingDeadlines = nextState;
          if (nextState) view.showCompletedTasks = false;
          render();
        };
      });

      const dashboardExportBtn = document.getElementById('dashboardExportBtn');
      if (dashboardExportBtn) {
        dashboardExportBtn.onclick = () => {
          if (!ensureAdminAccess()) return;
          exportExcel();
        };
      }

      const dashboardDownloadJsonBtn = document.getElementById('dashboardDownloadJsonBtn');
      if (dashboardDownloadJsonBtn) {
        dashboardDownloadJsonBtn.onclick = () => {
          if (!ensureAdminAccess()) return;
          downloadSharedJsonFile();
        };
      }

      const dashboardReloadSharedBtn = document.getElementById('dashboardReloadSharedBtn');
      if (dashboardReloadSharedBtn) {
        dashboardReloadSharedBtn.onclick = async () => {
          if (!ensureAdminAccess()) return;
          const confirmed = confirm('Revenir au contenu de data.json et effacer la copie locale de ce navigateur ?');
          if (!confirmed) return;
          await reloadSharedData();
        };
      }

      const dashboardImportFile = document.getElementById('dashboardImportFile');
      if (dashboardImportFile) {
        dashboardImportFile.onchange = async (e) => {
          if (!ensureAdminAccess()) { e.target.value = ''; return; }
          const file = e.target.files[0];
          if (!file) return;
          await importExcel(file);
          e.target.value = '';
        };
      }

      document.querySelectorAll('[data-toggle-completed-tasks]').forEach(btn => {
        btn.onclick = () => {
          const nextState = !view.showCompletedTasks;
          view.showCompletedTasks = nextState;
          if (nextState) view.showUpcomingDeadlines = false;
          render();
        };
      });

      document.querySelectorAll('[data-calendar-nav]').forEach(btn => {
        btn.onclick = () => {
          view.calendarMonthOffset = (Number(view.calendarMonthOffset) || 0) + (btn.dataset.calendarNav === 'next' ? 1 : -1);
          render();
        };
      });

      if (view.screen !== 'task') return;
      const task = getTask();
      if (!task) return;
      document.querySelectorAll('[data-edit-accountable]').forEach(el => {
        el.onclick = () => {
          if (!ensureAdminAccess()) return;
          const value = window.prompt('', task.accountable || '');
          if (value === null) return;
          task.accountable = value.replace(/[^A-Za-z]/g, '').toUpperCase().slice(0, 8);
          saveData();
          render();
        };
      });


      document.querySelectorAll('[data-toggle-section]').forEach(head => {
        head.onclick = (e) => {
          if (e.target.closest('[data-show-input]') || e.target.closest('[data-add-deadline]')) return;
          const key = head.dataset.toggleSection;
          const nextState = !(task.ui[key] && task.ui[key].open);
          Object.keys(task.ui).forEach(uiKey => {
            if (uiKey === 'deadlines') task.ui[uiKey].open = false;
            else if (task.ui[uiKey] && typeof task.ui[uiKey] === 'object') task.ui[uiKey].open = false;
          });
          if (task.ui[key]) task.ui[key].open = nextState;
          render();
        };
      });

      document.querySelectorAll('[data-show-input]').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          if (!ensureAdminAccess()) return;
          const key = btn.dataset.showInput;
          Object.keys(task.ui).forEach(uiKey => {
            if (uiKey === 'deadlines') task.ui[uiKey].open = false;
            else if (task.ui[uiKey] && typeof task.ui[uiKey] === 'object') task.ui[uiKey].open = false;
          });
          task.ui[key].open = true;
          task.ui[key].input = true;
          render();
          const input = document.querySelector(`[data-note-input="${key}"]`);
          if (input) input.focus();
        };
      });

      document.querySelectorAll('[data-delete-section-note]').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          if (!ensureAdminAccess()) return;
          const key = btn.dataset.deleteSectionNote;
          const index = Number(btn.dataset.noteIndex);
          if (!task.sections[key] || !Array.isArray(task.sections[key].notes)) return;
          if (Number.isNaN(index) || index < 0 || index >= task.sections[key].notes.length) return;
          task.sections[key].notes.splice(index, 1);
          saveData('Élément supprimé');
          render();
        };
      });

      document.querySelectorAll('[data-note-input]').forEach(input => {
        input.onkeydown = (e) => {
          if (e.key !== 'Enter') return;
          e.preventDefault();
          if (!ensureAdminAccess()) return;
          const key = input.dataset.noteInput;
          const value = input.value.trim();
          if (!value) return;
          task.sections[key].notes.push(value);
          task.ui[key].open = true;
          task.ui[key].input = false;
          saveData();
          render();
        };
        input.onblur = () => {
          const key = input.dataset.noteInput;
          if (!input.value.trim()) {
            task.ui[key].input = false;
            render();
          }
        };
      });


      document.querySelectorAll('[data-add-deadline]').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          if (!ensureAdminAccess()) return;
          const newIndex = task.deadlines.length;
          task.deadlines.push({ label: '', date: '', status: '', priority: 3, notes: '', notesOpen: false });
          task.deadlineUi.editIndex = newIndex;
          saveData();
          render();
          requestAnimationFrame(() => {
            const input = document.querySelector(`[data-deadline-field="label"][data-deadline-index="${newIndex}"]`);
            if (input) {
              input.focus();
            }
          });
        };
      });

      document.querySelectorAll('[data-edit-deadline]').forEach(item => {
        const openEditor = () => {
          if (!ensureAdminAccess()) return;
          const index = Number(item.dataset.editDeadline);
          if (Number.isNaN(index)) return;
          task.deadlineUi.editIndex = index;
          render();
          requestAnimationFrame(() => {
            const input = document.querySelector(`[data-deadline-primary="1"][data-deadline-index="${index}"]`);
            if (input) {
              input.focus();
            }
          });
        };
        item.onclick = openEditor;
        item.onkeydown = (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openEditor();
          }
        };
      });

      document.querySelectorAll('[data-deadline-editor-row], .deadline-card, [data-deadline-field], [data-show-deadline-notes], [data-delete-deadline]').forEach(el => {
        el.onclick = (e) => e.stopPropagation();
        el.onmousedown = (e) => e.stopPropagation();
      });

      document.querySelectorAll('[data-show-deadline-notes]').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          if (!ensureAdminAccess()) return;
          const index = Number(btn.dataset.showDeadlineNotes);
          task.deadlines[index].notesOpen = true;
          render();
          const input = document.querySelector(`[data-deadline-field="notes"][data-deadline-index="${index}"]`);
          if (input) input.focus();
        };
      });

      document.querySelectorAll('[data-delete-deadline]').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          if (!ensureAdminAccess()) return;
          const removedIndex = Number(btn.dataset.deleteDeadline);
          task.deadlines.splice(removedIndex, 1);
          if (task.deadlineUi.editIndex === removedIndex) task.deadlineUi.editIndex = -1;
          else if (task.deadlineUi.editIndex > removedIndex) task.deadlineUi.editIndex -= 1;
          saveData();
          render();
        };
      });

      document.querySelectorAll('[data-deadline-field]').forEach(field => {
        const handler = () => {
          if (!ensureAdminAccess()) return;
          const index = Number(field.dataset.deadlineIndex);
          const name = field.dataset.deadlineField;
          task.deadlines[index][name] = name === 'priority' ? getDeadlinePriorityValue(field.value) : field.value;
          if (name === 'notes') task.deadlines[index].notesOpen = !!field.value.trim();
          saveData();
        };
        field.oninput = handler;
        field.onchange = handler;
        field.onkeydown = (e) => {
          if (e.key !== 'Enter' || e.shiftKey) return;
          if (field.tagName === 'TEXTAREA') e.preventDefault();
          else e.preventDefault();
          handler();
          task.deadlineUi.editIndex = -1;
          saveData();
          render();
        };
        if (field.dataset.deadlineField === 'notes') {
          field.onblur = () => {
            const index = Number(field.dataset.deadlineIndex);
            if (!field.value.trim()) {
              task.deadlines[index].notesOpen = false;
              render();
            }
          };
        }
      });
    }

    document.addEventListener('fullscreenchange', () => {
      updateFullscreenUi();
    });

    document.addEventListener('keydown', (event) => {
      if (shouldIgnoreKeyboardNavigation(event)) return;

      if (event.key === 'ArrowRight') {
        if (view.screen !== 'task') return;
        event.preventDefault();
        goToNextTask();
        return;
      }

      if (event.key === 'ArrowLeft') {
        if (view.screen !== 'task') return;
        event.preventDefault();
        goToPreviousTask();
        return;
      }

      if (event.key === 'PageDown') {
        event.preventDefault();
        goForwardPage();
        return;
      }

      if (event.key === 'PageUp') {
        event.preventDefault();
        goBackPage();
      }
    });

    function exportExcel() {
      if (!window.XLSX) {
        alert('Librairie Excel indisponible.');
        return;
      }
      const rows = [];
      data.categories.forEach(category => {
        category.tasks.forEach(task => {
          const row = {
            'Catégorie': category.name,
            'Tâche': task.name,
            'Accountable': task.accountable || ''
          };
          PARAM_DEFS.forEach(({ key, label }) => {
            row[label] = (task.sections[key].notes || []).join('\n');
          });
          row['État d’avancement / deadline'] = (task.deadlines || []).map(d =>
            [d.label || '', getDeadlinePriorityValue(d.priority), d.date || '', d.status || '', d.notes || ''].join(' | ')
          ).join('\n');
          rows.push(row);
        });
      });
      const workbook = XLSX.utils.book_new();
      const sheet = XLSX.utils.json_to_sheet(rows);
      XLSX.utils.book_append_sheet(workbook, sheet, 'Suivi');
      const today = new Date();
const formattedDate = new Intl.DateTimeFormat('fr-BE', {
  day: '2-digit',
  month: '2-digit',
  year: 'numeric'
}).format(today).replace(/\//g, '-');

XLSX.writeFile(workbook, `suivi_taches_${formattedDate}.xlsx`);
    }

    async function importExcel(file) {
      if (!window.XLSX) {
        alert('Librairie Excel indisponible.');
        return;
      }
      const buffer = await file.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
      const next = { categories: [] };

      rows.forEach(row => {
        const categoryName = String(row['Catégorie'] || '').trim();
        const taskName = String(row['Tâche'] || '').trim();
        if (!categoryName || !taskName) return;

        let category = next.categories.find(c => c.name === categoryName);
        if (!category) {
          category = { name: categoryName, tasks: [] };
          next.categories.push(category);
        }

        const task = createTask(categoryName, taskName);
        task.accountable = String(row['Accountable'] || '').trim().toUpperCase().slice(0, 8);
        PARAM_DEFS.forEach(({ key, label }) => {
          task.sections[key].notes = String(row[label] || '')
            .split(/\r?\n+/)
            .map(v => v.trim())
            .filter(Boolean);
        });
        task.deadlines = String(row['État d’avancement / deadline'] || '')
          .split(/\r?\n+/)
          .map(line => line.trim())
          .filter(Boolean)
          .map(line => {
            const parts = line.split('|').map(v => v.trim());
            if (parts.length >= 5) {
              const [label, priority, date, status, ...rest] = parts;
              return { label: label || '', priority: getDeadlinePriorityValue(priority), date: date || '', status: status || '', notes: rest.join(' | ') || '' };
            }
            const [label, date, status, ...rest] = parts;
            return { label: label || '', priority: 0, date: date || '', status: status || '', notes: rest.join(' | ') || '' };
          });
        category.tasks.push(task);
      });

      if (!next.categories.length) {
        alert('Aucune donnée exploitable trouvée.');
        return;
      }

      data = migrateData(next);
      view = createBaseView();
      saveData('Importé');
      render();
    }

    initializeApp();
  </script>
</body>
</html>
